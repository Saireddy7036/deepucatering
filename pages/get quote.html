<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DEEPU CATERING</title>
  <link rel="stylesheet" href="../css/style.css">
  <title>Get a Quote</title>
  <link rel="stylesheet" href="../css/get quote.css">
</head>
<body>
<header>
  <div class="container nav">
    <a href="../index.html">
      <img src="../images/logo.png" alt="Deepu Catering Logo" class="logo">
</a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="../pages/services.html">Services</a>
      <a href="../pages/about.html">About</a>

    </nav>
  </div>
</header>

<!-- HERO -->
<section class="quote-hero">
  <div class="overlay">
    <h1>Get a Free Quote</h1>
    <p>Tell us about your event and we’ll get back to you within 24 hours.</p>
  </div>
</section>

<!-- FORM SECTION -->
<section class="quote container">
  <h2>Tell Us About Your Event</h2>

  <form class="quote-form">

    <div class="row">
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
    </div>

    <div class="row">
      <input type="tel" placeholder="Phone Number">
      <input type="date">
    </div>

    <div class="row">
      <input type="text" placeholder="Event Location">
      <input type="number" placeholder="Number of Guests">
    </div>

    <select>
      <option>Select Event Type</option>
      <option>Wedding</option>
      <option>Corporate Event</option>
      <option>Private Party</option>
    </select>

    <textarea placeholder="Tell us more about your event..."></textarea>

    <button type="submit">Request Quote</button>

  </form>
</section>

<!-- CONTACT INFO -->
<footer class="footer">
  <div class="container">
    <h3>Deepu catering</h3>
    <p>Email: manideepika2204@gamil.com</p>
    <p>Phone: +44 7404188199</p>
  </div>
</footer>

</body>
</html>
